# --- OPTIONS --- #

#titles
set-option -g set-titles on
set-option -g set-titles-string "[#W] #{s|/Users/petermariani|~|:pane_current_path}"

# term
set -g allow-passthrough on
set -g default-terminal "tmux-256color"
set-environment -g COLORTERM "truecolor"
set -g default-command /bin/zsh

# don't exit from tmux when closing a session (seggestion by Sesh)
set -g detach-on-destroy off

# mouse
set -g mouse on

# don't rename windows automatically
set -g allow-rename off

# allows for autoread in vim
set -g focus-events on

# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -sg escape-time 10

# increase scrollback buffer size
set -g history-limit 50000

# tmux messages are displayed for 1 second
set -g display-time 1000

# start with status bar off
set -g status off

# start window indexing at one instead of zero
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# vim
set -g xterm-keys on # for vim
set -g mode-keys vi # vi keys in copy mode

# --- KEYBINDINGS --- #

# prefix keys
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g prefix2 F1
bind F1 send-prefix -2

# move left/right windows
bind C-p previous-window
bind C-n next-window
bind -r C-h previous-window
bind -r C-l next-window
bind h previous-window
bind l next-window
unbind j

# window splitting
unbind %
bind v split-window -h
bind b split-window -v

# easy source
bind R source-file ~/.tmux.conf \; display-message "Config reloaded..."

# popup terminal
bind-key t display-popup

# vim copy yank
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# Keep status visibility in sync with window count
set-hook -g after-new-window 'if -F "#{>=:#{session_windows},2}" "set status on" "set status off"'
set-hook -g window-unlinked  'if -F "#{>=:#{session_windows},2}" "set status on" "set status off"'
set-hook -g client-attached  'if -F "#{>=:#{session_windows},2}" "set status on" "set status off"'
bind-key u if -F '#{==:#{status},on}' 'set status off' 'set status on'
unbind i

# Sesh
bind-key " " display-popup -E -w 40% "sesh connect \"$(
 sesh list -i | gum filter --limit 1 --no-sort --no-strip-ansi --fuzzy --placeholder 'Pick a sesh' --height 50 --prompt='⚡'
)\""
bind -N "last-session (via sesh) " \\ run-shell "sesh last"

# --- APPEARANCE --- #

# statusline position
set-option -g status-position top

# statusline color
set-option -g status-style bg=default
# set -g status-bg '#0f0f0f'

set -g status-fg 'colour252'

# statusline left
set -g status-left '#[fg=colour237]| '
set -g status-right '#[fg=colour3]#{s|/Users/petermariani|~|:pane_current_path}    #[fg=colour9]%H:%M    #[fg=colour6] #S:#I '

# pain border
set -g pane-active-border-style "fg=colour8"
set -g pane-border-style        "fg=colour8"

# message line
set -g message-style "fg=colour2"

# statusline right
set -g status-right-length "80"
set -g status-left-length "80"

# statusline window names
setw -g window-status-format "#[fg=colour243]  #(basename \"#{s|/Users/petermariani|~|:pane_current_path}\")   #[fg=colour237]|#[default]"
setw -g window-status-current-format "#[fg=colour3]  #(basename \"#{s|/Users/petermariani|~|:pane_current_path}\")   #[default]#[fg=colour237]|#[default]"

# copy mode - (not working now with iTerm2)
setw -g mode-style bg=magenta

# window backgrounds
# setw -g window-style "bg=colour234" #234
# setw -g window-active-style "bg=colour232"

# -------------------------------------------------------------------------------

# Tmux Plugin Manager (TPM)
# -- To use the plugins TPM must be installed. If not installed:
# 1. git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# 2. Reload tmux if it's already started with `r
# 3. Launch tmux and hit `I to fetch any plugins

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'off'   # do NOT auto-restore on tmux start
set -g @continuum-save-interval '15'  # autosave every 15 minutes (default is 15)
# set -g @resurrect-capture-pane-contents 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'

